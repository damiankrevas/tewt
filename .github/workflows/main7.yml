name: noop
on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:
    branches:

jobs:
  build:
    env:
      PY_COLORS: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ---------------------------------------------------------
    # Random harmless check step #1
    # ---------------------------------------------------------
    - name: Random Sanity Check
      run: |
        echo "Running random sanity check..."
        RAND=$((RANDOM % 3))
        if [ "$RAND" -eq 1 ]; then
          echo "Check: environment stable."
        elif [ "$RAND" -eq 2 ]; then
          echo "Check: system entropy normal."
        else
          echo "Check: idle diagnostic OK."
        fi

    # ---------------------------------------------------------
    # Install Brave Browser
    # ---------------------------------------------------------
    - name: Install Brave Browser
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get update
        sudo apt-get install -y apt-transport-https curl
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt-get update
        sudo apt-get install -y brave-browser
      shell: bash

    # ---------------------------------------------------------
    # Install WARP
    # ---------------------------------------------------------
    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor \
          --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    - name: Ensure connection is WARP'ed
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"
      shell: bash

    # ---------------------------------------------------------
    # Random harmless check step #2
    # ---------------------------------------------------------
    - name: Random Environment Noise
      run: |
        echo "Performing random environment noise step..."
        case $((RANDOM % 4)) in
          0) echo "Noise: CPU baseline nominal." ;;
          1) echo "Noise: Memory footprint acceptable." ;;
          2) echo "Noise: Network jitter within tolerance." ;;
          3) echo "Noise: No anomalies detected." ;;
        esac

    # ---------------------------------------------------------
    # Locale
    # ---------------------------------------------------------
    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
        locale -c -k LC_NUMERIC
        localectl status

    # ---------------------------------------------------------
    # Dependencies
    # ---------------------------------------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel
        pip install --upgrade seleniumbase
        pip install --upgrade pyautogui
        pip install --upgrade pymongo
        pip install --upgrade python-xlib

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    # ---------------------------------------------------------
    # Random harmless check step #3
    # ---------------------------------------------------------
    - name: Random Pre-Run Diagnostic
      run: |
        echo "Running pre-run diagnostic..."
        VAL=$((RANDOM % 5))
        echo "Diagnostic code: $VAL (OK)"

    # ---------------------------------------------------------
    # Run script
    # ---------------------------------------------------------
    - name: Run python noop.py --debug
      run: |
        python noop.py --brave --incognito --do-not-track --xvfb --screenshot

